server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro "directory" format emits /east-of-eden/index.html etc.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
